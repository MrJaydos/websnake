<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Snake</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lb-page">
    <div id="lb-header">
      <a href="/" class="icon-btn" title="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <h2>Leaderboard</h2>
    </div>
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Score</th><th>Mode</th></tr></thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>

  <script>
    (async () => {
      const tbody = document.getElementById("leaderboard-body");
      try {
        const res = await fetch("/api/scores");
        const data = await res.json();
        tbody.innerHTML = data
          .map((row, i) => {
            const d = document.createElement("div");
            d.textContent = row.name;
            const safe = d.innerHTML;
            return `<tr><td>${i + 1}</td><td>${safe}</td><td>${row.score}</td><td>${row.mode === "easy" ? "Easy" : "Hard"}</td></tr>`;
          })
          .join("");
      } catch {
        tbody.innerHTML = '<tr><td colspan="4">Could not load scores</td></tr>';
      }
    })();
  </script>
</body>
</html>
