<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="hud">
    <div id="hud-left">
      <span id="current-score">0</span>
    </div>
    <div id="hud-right">
      <div id="top-score-badge">
        <span class="badge-label">#1</span>
        <span id="top-score-name">---</span>
        <span id="top-score-value">0</span>
      </div>
      <a href="/leaderboard.html" class="icon-btn" title="Leaderboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="5" height="9"/><rect x="10" y="5" width="5" height="16"/><rect x="17" y="9" width="5" height="12"/></svg>
      </a>
    </div>
  </div>

  <div id="game-area">
    <canvas id="game-canvas"></canvas>
    <div id="overlay">
      <div id="start-screen" class="screen">
        <h2>Snake</h2>
        <p>Arrow keys / WASD or swipe</p>
        <div id="mode-select">
          <button class="mode-btn selected" data-mode="easy">Easy</button>
          <button class="mode-btn" data-mode="hard">Hard</button>
        </div>
        <p id="mode-desc">Walls wrap around</p>
        <button id="start-btn">Play</button>
        <a href="/multi.html" class="multi-link">Multiplayer</a>
      </div>
      <div id="gameover-screen" class="screen" hidden>
        <h2>Game Over</h2>
        <p>Score: <span id="final-score">0</span> (<span id="final-mode"></span>)</p>
        <form id="score-form">
          <input type="text" id="player-name" placeholder="Your name" maxlength="20" required autocomplete="off">
          <button type="submit">Submit Score</button>
        </form>
        <button id="replay-btn" hidden>Play Again</button>
      </div>
    </div>
  </div>

  <div id="dpad">
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="up" aria-label="Up">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l8 12H4z"/></svg>
      </button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="left" aria-label="Left">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M4 12l12-8v16z"/></svg>
      </button>
      <div class="dpad-spacer"></div>
      <button class="dpad-btn" data-dir="right" aria-label="Right">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 12l-12 8V4z"/></svg>
      </button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="down" aria-label="Down">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20l-8-12h16z"/></svg>
      </button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
